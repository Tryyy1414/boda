<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Boda - Paolo & Kimberly</title>
    <link rel="icon" type="image/svg+xml" href="img/icon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="bg-music" loop preload="auto">
        <source src="audio/saxoversion.mp3" type="audio/mpeg">
    </audio>

    <div id="landing" class="screen">
        <h2 class="serif section-title">NUESTRA BODA</h2>
        <h1 class="cursive main-names">Paolo & Kimberly</h1>
        <p class="date-main">25 - JULIO - 2026 | 09:00 am</p>

        <div class="envelope-wrapper" onclick="abrirInvitacion()">
            <div class="envelope">
                <div class="envelope-back"></div>
                <div class="inner-letter">
                    <p class="cursive letter-text">Nuestra Boda</p>
                </div>
                <div class="envelope-front"></div>
                <div class="flap"></div>
                <div class="seal"></div>
            </div>
        </div>
        <p class="click-hint">CLICK PARA ABRIR LA INVITACIÓN</p>
    </div>

    <div id="details" class="screen" style="display: none; opacity: 0;">
        <h3 class="serif sub-title">NOS CASAMOS</h3>
        
        <div class="photo-container">
            <div class="flower-wreath"></div>
            <div class="photo-frame-border">
                <div class="photo-frame-inner"></div>
            </div>
        </div>
        
        <h1 class="cursive main-names">Paolo & Kimberly</h1>
        <p class="subtitle serif">Queremos que seas parte de este día tan especial</p>
        
        <div class="date-block">
            <span class="day-name">SÁBADO</span>
            <span class="big-day">25</span>
            <span class="month-time">09:00 AM<br>JULIO</span>
        </div>
        
        <div class="location-box">
            <p class="venue-name">Ceremonia: Municipalidad Distrital de Santa Rosa</p>
            <div class="map-wrapper">
                <iframe src="https://maps.google.com/maps?q=Municipalidad+Distrital+de+Santa+Rosa,+Lima,+Peru&t=&z=15&ie=UTF8&iwloc=&output=embed" width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </div>
        <div class="location-box">
            <p class="venue-name">Recepción</p>
            <div class="map-wrapper">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3686.3626326912376!2d-77.16784144090566!3d-11.79564061539226!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9105d50020a55617%3A0xd3dcef232fbb13c1!2sCasa%20Local%20Evento%20Santa%20Rosa!5e0!3m2!1ses!2spe!4v1784323101977!5m2!1ses!2spe" width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
